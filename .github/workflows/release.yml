name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ============================================================
  # Build standalone binaries on each platform
  # ============================================================
  build:
    name: Build · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: Compactum-macOS.zip
            artifact_path: dist/Compactum-macOS.zip
          - os: windows-latest
            artifact_name: Compactum-Windows.zip
            artifact_path: dist/Compactum-Windows.zip
          - os: ubuntu-latest
            artifact_name: Compactum-Linux.tar.gz
            artifact_path: dist/Compactum-Linux.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Linux system deps (GTK + WebKit for pywebview)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-gi python3-gi-cairo gir1.2-gtk-3.0 \
            gir1.2-webkit2-4.1 \
            libgirepository1.0-dev libcairo2-dev pkg-config

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Linux pywebview GTK extra
        if: runner.os == 'Linux'
        run: pip install "pywebview[gtk]"

      - name: Build with PyInstaller
        run: pyinstaller build/compactum.spec --noconfirm --clean

      # ----- macOS: zip the .app bundle -----
      - name: Package macOS .app
        if: runner.os == 'macOS'
        run: |
          cd dist
          ditto -c -k --keepParent "Compactum.app" Compactum-macOS.zip

      # ----- Windows: zip the executable folder -----
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/Compactum.exe" -DestinationPath "dist/Compactum-Windows.zip"

      # ----- Linux: tar the binary -----
      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          cd dist
          tar czf Compactum-Linux.tar.gz "Compactum"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  # ============================================================
  # Build sdist + wheel for PyPI-style distribution
  # ============================================================
  python-package:
    name: Build wheel & sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  # ============================================================
  # Publish a GitHub Release with all artifacts attached
  # ============================================================
  release:
    name: Publish Release
    needs: [build, python-package]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} release-files/ \;
          ls -la release-files

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: release-files/*
